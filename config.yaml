

# Competitor Website Monitoring Configuration
# Context: Avalara competes across enterprise (Vertex, Thomson Reuters),
# mid-market (Sovos), and modern/SaaS-native (Anrok, Kintsugi, Sphere, Numeral) segments.
# Note: Vertex and Kintsugi launched a joint product in Oct 2025 — monitor both
# for signals about that partnership's direction.

competitors:

  # --- Enterprise tier ---

  - name: "Vertex - Homepage"
    url: "https://www.vertexinc.com"
    requires_js: false

  - name: "Vertex - Solutions"
    url: "https://www.vertexinc.com/solutions"
    requires_js: false

  - name: "Vertex - News"
    url: "https://www.vertexinc.com/company/news/latest-news"
    requires_js: false

  - name: "Thomson Reuters ONESOURCE - Homepage"
    url: "https://tax.thomsonreuters.com/en/onesource"
    requires_js: false

  - name: "Thomson Reuters ONESOURCE - Indirect Tax Compliance"
    url: "https://tax.thomsonreuters.com/en/onesource/indirect-tax/compliance"
    requires_js: false

  - name: "Sovos - Homepage"
    url: "https://sovos.com"
    requires_js: false

  - name: "Sovos - Products"
    url: "https://sovos.com/products/"
    requires_js: false

  - name: "Sovos - Compliance Cloud"
    url: "https://sovos.com/compliance-cloud/"
    requires_js: false

  # --- Modern/SaaS-native tier ---

  - name: "Anrok - Homepage"
    url: "https://www.anrok.com"
    requires_js: true

  - name: "Anrok - Product"
    url: "https://www.anrok.com/product"
    requires_js: true

  - name: "Anrok - Blog"
    url: "https://www.anrok.com/resources"
    requires_js: true

  - name: "Kintsugi - Homepage"
    url: "https://www.trykintsugi.com"
    requires_js: true

  - name: "Kintsugi - Product Platform"
    url: "https://www.trykintsugi.com/product-platform"
    requires_js: true

  - name: "Sphere - Homepage"
    url: "https://www.getsphere.com"
    requires_js: true

  - name: "Sphere - Blog"
    url: "https://www.getsphere.com/blog"
    requires_js: true

  - name: "Numeral - Homepage"
    url: "https://www.numeralhq.com"
    requires_js: true

  - name: "Numeral - Solutions"
    url: "https://www.numeralhq.com/solutions/saas"
    requires_js: false

# Monitoring settings
monitoring:
  check_interval: 24
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  timeout: 30

# AI Analysis settings
# provider: "anthropic" or "openai"
ai:
  provider: "openai"  # Switch between "anthropic" or "openai"

  # Anthropic settings (used when provider = "anthropic")
  anthropic:
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 4096

  # OpenAI settings (used when provider = "openai")
  openai:
    model: "gpt-4o"
    max_tokens: 4096

# Email settings
email:
  from_email: "monitoring@edelstein.org"
  from_name: "Avalara Competitor Intelligence"
  to_emails:
    - "alex@edelstein.org"
  subject_prefix: "[Competitor Alert]"