# Competitor Website Monitoring Configuration

# List of competitor URLs to monitor
competitors:
  - name: "Competitor A - Homepage"
    url: "https://www.competitor-a.com"
    requires_js: false

  - name: "Competitor A - Pricing"
    url: "https://www.competitor-a.com/pricing"
    requires_js: false

  - name: "Competitor B - Homepage"
    url: "https://www.competitor-b.com"
    requires_js: true

  - name: "Competitor B - Features"
    url: "https://www.competitor-b.com/features"
    requires_js: false

  - name: "Competitor C - Homepage"
    url: "https://www.competitor-c.com"
    requires_js: false

  - name: "Competitor C - Blog"
    url: "https://www.competitor-c.com/blog"
    requires_js: false

  - name: "Competitor D - Homepage"
    url: "https://www.competitor-d.com"
    requires_js: false

  - name: "Competitor D - Product"
    url: "https://www.competitor-d.com/product"
    requires_js: true

# Monitoring settings
monitoring:
  # Minimum time between checks (in hours)
  check_interval: 24

  # User agent for scraping
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

  # Timeout for HTTP requests (in seconds)
  timeout: 30

# Anthropic API settings
anthropic:
  model: "claude-sonnet-4"
  max_tokens: 4096

# Email settings
email:
  from_email: "monitoring@yourdomain.com"
  from_name: "Competitor Intelligence Monitor"
  to_emails:
    - "team@yourdomain.com"
  subject_prefix: "[Competitor Alert]"
