
# Competitor Website Monitoring Configuration

# Monitoring settings
monitoring:
  check_interval: 24
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  timeout: 30

# AI Analysis settings
# provider: "anthropic" or "openai"
ai:
  provider: "openai"  # Switch between "anthropic" or "openai"

  # Anthropic settings (used when provider = "anthropic")
  anthropic:
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 4096

  # OpenAI settings (used when provider = "openai")
  openai:
    model: "gpt-4o"
    max_tokens: 4096

  # System prompt sent to the AI for analysis
  system_prompt: |
    You are a competitive intelligence analyst monitoring competitor websites for strategic changes.
    For each changed page, summarize the new or changed content compared to the previous version of the page.
    For blog pages, create a list of new blog posts with their titles.

# Email settings
email:
  from_email: "monitoring@edelstein.org"
  from_name: "Avalara Competitor Intelligence"
  to_emails:
    - "alex@edelstein.org"
  subject_prefix: "[Competitor Alert]"