name: Competitor Monitoring

on:
  # Run daily at 9 AM UTC
  schedule:
    - cron: '0 9 * * *'

  # Allow manual trigger
  workflow_dispatch:

  # Run on push to main (for testing)
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'config.yaml'
      - '.github/workflows/monitor.yml'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Restore content database cache
        uses: actions/cache/restore@v4
        with:
          path: content_db/
          key: content-db-${{ github.run_id }}
          restore-keys: |
            content-db-

      - name: Run competitor monitoring
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python src/monitor.py

      - name: Commit and push snapshots
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Check if there are any changes
          if [[ -n $(git status --porcelain snapshots/) ]]; then
            git add snapshots/
            git commit -m "Update snapshots - $(date -u +'%Y-%m-%d %H:%M UTC')"

            # Pull latest changes and handle conflicts
            git fetch origin main

            # If rebase fails due to conflicts, use ours strategy (prefer our snapshots)
            if ! git pull --rebase origin main; then
              echo "Rebase failed, using ours strategy to resolve conflicts"
              git rebase --abort
              git pull origin main --no-rebase --strategy-option=ours
              git add snapshots/
              git commit --amend --no-edit
            fi

            git push
            echo "Snapshots updated and committed"
          else
            echo "No changes to snapshots"
          fi

      - name: Save content database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: content_db/
          key: content-db-${{ github.run_id }}

      - name: Upload snapshots as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snapshots-${{ github.run_number }}
          path: snapshots/
          retention-days: 30
